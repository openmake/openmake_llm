<!DOCTYPE html>
<html lang="ko" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
    <title>관리자 대시보드 - OpenMake.Ai</title>
    <link rel="icon" type="image/png" href="/logo.png">

    <!-- 통합 디자인 시스템 -->
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"
        rel="stylesheet">
    <link rel="stylesheet" href="/css/design-tokens.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/layout.css">
    <link rel="stylesheet" href="/css/pages/dashboard.css">

    <style>
        /* ==========================================
           Admin Dashboard — Page-specific Styles
           ========================================== */

        /* Stats grid: 4 columns fixed, responsive fallback */
        .admin-stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: var(--space-4);
            margin-bottom: var(--space-6);
        }

        .admin-stats-grid .metric-card {
            text-align: center;
            padding: var(--space-4) var(--space-3);
        }

        .admin-stats-grid .metric-card-value {
            font-size: var(--font-size-2xl);
        }

        /* Tabs: fit-content width */
        .admin-tabs {
            margin-bottom: var(--space-6);
            width: fit-content;
        }

        /* Panel visibility */
        .panel { display: none; }
        .panel.active { display: block; }

        /* Search/filter bar inside cards */
        .admin-filter-bar {
            margin-bottom: var(--space-4);
        }

        .admin-filter-bar .form-select,
        .admin-filter-bar .form-input[type="date"] {
            width: auto;
        }

        .admin-filter-bar .form-input {
            max-width: 300px;
        }

        /* Embedded table: no double border */
        .admin-table-wrap {
            overflow-x: auto;
            border: none;
            border-radius: 0;
            box-shadow: none;
        }

        /* Conversation content truncation */
        .conv-content-cell {
            max-width: 400px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* Pagination ellipsis and info */
        .admin-pg-ellipsis {
            display: inline-flex;
            align-items: center;
            padding: 0 var(--space-2);
            color: var(--text-muted);
            font-size: var(--font-size-sm);
            user-select: none;
        }
        .admin-pg-info {
            display: inline-flex;
            align-items: center;
            padding: 0 var(--space-3);
            font-size: var(--font-size-xs);
            color: var(--text-muted);
            font-weight: var(--font-weight-medium);
        }

                /* Pagination row */
        .admin-pagination {
            display: flex;
            justify-content: center;
            gap: var(--space-2);
            margin-top: var(--space-4);
        }

        /* Role/status badges — design token colors */
        .badge-admin {
            background: var(--danger-light);
            color: var(--danger);
        }
        .badge-user {
            background: var(--success-light);
            color: var(--success);
        }
        .badge-guest {
            background: rgba(156, 163, 175, 0.15);
            color: var(--text-muted);
        }
        .badge-active {
            background: var(--success-light);
            color: var(--success);
        }
        .badge-inactive {
            background: var(--danger-light);
            color: var(--danger);
        }

        /* Toast notification */
        .toast {
            position: fixed;
            bottom: var(--space-5);
            right: var(--space-5);
            padding: var(--space-3) var(--space-5);
            border-radius: var(--radius-md);
            border: var(--border-width) solid var(--border-strong);
            color: white;
            font-size: var(--font-size-sm);
            font-weight: var(--font-weight-semibold);
            z-index: 1001;
            box-shadow: var(--shadow-md);
            animation: slideIn 0.3s ease;
        }

        .toast.success { background: var(--success); color: var(--text-inverse); }
        .toast.error { background: var(--danger); }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* Responsive — tablet */
        @media (max-width: 1024px) {
            .admin-stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        /* Responsive — mobile */
        @media (max-width: 768px) {
            .admin-stats-grid {
                grid-template-columns: 1fr 1fr;
                gap: var(--space-3);
            }

            .admin-stats-grid .metric-card-value {
                font-size: var(--font-size-xl);
            }

            .admin-tabs {
                width: 100%;
            }

            .admin-tabs .tab {
                font-size: var(--font-size-xs);
                padding: var(--space-2) var(--space-3);
            }

            .admin-filter-bar {
                flex-direction: column;
            }

            .admin-filter-bar .form-select,
            .admin-filter-bar .form-input {
                width: 100%;
                max-width: none;
            }

            .data-table th,
            .data-table td {
                padding: var(--space-2) var(--space-3);
                font-size: var(--font-size-xs);
            }
        }
    </style>
</head>

<body>
    <div class="app-layout">
        <button class="mobile-menu-btn" onclick="toggleMobileSidebar()"><span></span><span></span><span></span></button>
        <div class="sidebar-overlay" onclick="toggleMobileSidebar()"></div>
        <nav class="sidebar" id="sidebar"></nav>

        <div class="main-content">
            <div class="page-content">
                <div class="container container-lg">
                    <header class="page-header">
                        <div>
                            <h1 class="page-title page-title-gradient">👥 관리자 대시보드</h1>
                            <p class="page-subtitle">사용자 및 대화 관리</p>
                        </div>
                        <div class="page-actions">
                            <a href="/" class="btn btn-secondary">← 채팅으로 돌아가기</a>
                        </div>
                    </header>

                    <div class="tabs admin-tabs">
                        <button class="tab active" onclick="switchTab('users')">👥 사용자 관리</button>
                        <button class="tab" onclick="switchTab('conversations')">💬 대화 기록</button>
                        <button class="tab" onclick="switchTab('stats')">📊 통계</button>
                    </div>

                    <!-- Stats Cards -->
                    <div class="admin-stats-grid">
                        <div class="metric-card card">
                            <div class="metric-card-value" id="statTotalUsers">0</div>
                            <div class="text-muted text-sm">총 사용자</div>
                        </div>
                        <div class="metric-card card">
                            <div class="metric-card-value" id="statActiveUsers">0</div>
                            <div class="text-muted text-sm">활성 사용자</div>
                        </div>
                        <div class="metric-card card">
                            <div class="metric-card-value" id="statAdmins">0</div>
                            <div class="text-muted text-sm">관리자</div>
                        </div>
                        <div class="metric-card card">
                            <div class="metric-card-value" id="statTodayQueries">0</div>
                            <div class="text-muted text-sm">오늘 질문</div>
                        </div>
                    </div>

                    <!-- Users Panel -->
                    <div id="usersPanel" class="panel active">
                        <div class="card">
                            <div class="card-header">
                                <span class="card-title">사용자 목록</span>
                                <button class="btn btn-primary btn-sm" onclick="showAddUserModal()">+ 사용자 추가</button>
                            </div>
                            <div class="search-bar admin-filter-bar">
                                <select id="filterRole" class="form-select" aria-label="역할 필터" onchange="loadUsers()">
                                    <option value="">모든 역할</option>
                                    <option value="admin">관리자</option>
                                    <option value="user">일반 사용자</option>
                                    <option value="guest">게스트</option>
                                </select>
                                <input type="text" id="filterSearch" class="form-input" aria-label="이메일 검색"
                                    placeholder="이메일 검색..." onkeyup="debounceSearch()">
                            </div>
                            <div class="table-container admin-table-wrap">
                                <table class="data-table">
                                    <thead>
                                        <tr>
                                            <th>ID</th>
                                            <th>이메일</th>
                                            <th>역할</th>
                                            <th>상태</th>
                                            <th>가입일</th>
                                            <th>마지막 로그인</th>
                                            <th>작업</th>
                                        </tr>
                                    </thead>
                                    <tbody id="usersList"></tbody>
                                </table>
                            </div>
                            <div class="admin-pagination" id="usersPagination"></div>
                        </div>
                    </div>

                    <!-- Conversations Panel -->
                    <div id="conversationsPanel" class="panel">
                        <div class="card">
                            <div class="card-header">
                                <span class="card-title">대화 기록</span>
                                <button class="btn btn-secondary btn-sm" onclick="exportCSV()">📥 CSV 내보내기</button>
                            </div>
                            <div class="search-bar admin-filter-bar">
                                <input type="date" id="filterDate" class="form-input"
                                    onchange="loadConversations()">
                                <select id="filterConvRole" class="form-select"
                                    onchange="loadConversations()">
                                    <option value="">모든 역할</option>
                                    <option value="user">사용자만</option>
                                    <option value="assistant">AI 응답만</option>
                                </select>
                                <input type="text" id="filterConvSearch" class="form-input"
                                    placeholder="검색어..." onkeyup="debounceConvSearch()">
                            </div>
                            <div class="table-container admin-table-wrap">
                                <table class="data-table">
                                    <thead>
                                        <tr>
                                            <th>시간</th>
                                            <th>역할</th>
                                            <th>내용</th>
                                            <th>모델</th>
                                        </tr>
                                    </thead>
                                    <tbody id="conversationsList"></tbody>
                                </table>
                            </div>
                            <div class="admin-pagination" id="convPagination"></div>
                        </div>
                    </div>

                    <!-- Stats Panel -->
                    <div id="statsPanel" class="panel">
                        <div class="card">
                            <div class="card-header">
                                <span class="card-title">시스템 통계</span>
                            </div>
                            <div class="card-body">
                                <p class="text-muted">상세 통계 기능은 추후 추가 예정입니다.</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Edit User Modal -->
    <div class="modal-overlay" id="editUserModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title" id="editModalTitle">사용자 편집</h3>
                <button class="modal-close" onclick="closeModal()">×</button>
            </div>
            <form class="modal-body" onsubmit="event.preventDefault()">
                <input type="hidden" id="editUserId">
                <div class="form-group">
                    <label class="form-label" for="editEmail">이메일</label>
                    <input type="email" id="editEmail" class="form-input">
                </div>
                <div class="form-group">
                    <label class="form-label" for="editPassword">비밀번호 (변경 시에만 입력)</label>
                    <input type="password" id="editPassword" class="form-input" placeholder="새 비밀번호" autocomplete="new-password">
                </div>
                <div class="form-group">
                    <label class="form-label" for="editRole">역할</label>
                    <select id="editRole" class="form-select">
                        <option value="user">일반 사용자</option>
                        <option value="admin">관리자</option>
                        <option value="guest">게스트</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label" for="editActive">상태</label>
                    <select id="editActive" class="form-select">
                        <option value="1">활성</option>
                        <option value="0">비활성</option>
                    </select>
                </div>
            </form>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal()">취소</button>
                <button class="btn btn-primary" onclick="saveUser()">저장</button>
            </div>
        </div>
    </div>

    <script src="/js/components/sidebar.js"></script>
    <script>
        const API_BASE = window.location.origin;
        // authToken은 httpOnly 쿠키로 관리 — localStorage 의존 제거
        let currentUser = null;
        let usersPage = 1;
        let convPage = 1;
        const pageSize = 20;
        let searchTimeout;

        async function checkAuth() {
             const user = localStorage.getItem('user');
             if (!user) { window.location.href = '/login.html'; return false; }
             try {
                 const res = await authFetch('/api/auth/me');
                 const data = await res.json();
                 const payload = data.data || data;
                 if (!res.ok || !payload.user) throw new Error('인증 실패');
                 currentUser = payload.user;
                if (currentUser.role !== 'admin') {
                    showToast('관리자 권한이 필요합니다', 'error');
                    setTimeout(() => window.location.href = '/', 1500);
                    return false;
                }
                return true;
            } catch (e) {
                window.location.href = '/login.html';
                return false;
            }
        }

        async function authFetch(url, options = {}) {
            return fetch(url, {
                ...options,
                headers: { 'Content-Type': 'application/json', ...(options.headers || {}) },
                credentials: 'include'
            });
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.querySelector(`[onclick="switchTab('${tab}')"]`).classList.add('active');
            document.getElementById(`${tab}Panel`).classList.add('active');
        }

        async function loadUsers() {
             const role = document.getElementById('filterRole').value;
             const search = document.getElementById('filterSearch').value;
             try {
                 const params = new URLSearchParams({ page: usersPage, limit: pageSize, ...(role && { role }), ...(search && { search }) });
                 const res = await authFetch(`/api/admin/users?${params}`);
                 const data = await res.json();
                 const payload = data.data || data;
                 renderUsers(payload.users || []);
                 renderPagination('usersPagination', payload.total || 0, usersPage, (p) => { usersPage = p; loadUsers(); });
             } catch (e) { showToast('사용자 목록 로드 실패', 'error'); }
         }

        function renderUsers(users) {
            const tbody = document.getElementById('usersList');
            if (users.length === 0) { tbody.innerHTML = '<tr><td colspan="7" class="text-center text-muted p-4">사용자가 없습니다</td></tr>'; return; }
            tbody.innerHTML = users.map(u => `
                <tr>
                    <td>${u.id}</td>
                    <td>${escapeHtml(u.email)}</td>
                    <td><span class="badge badge-${u.role}">${getRoleName(u.role)}</span></td>
                    <td><span class="badge ${u.is_active ? 'badge-active' : 'badge-inactive'}">${u.is_active ? '활성' : '비활성'}</span></td>
                    <td>${formatDate(u.created_at)}</td>
                    <td>${u.last_login ? formatDate(u.last_login) : '-'}</td>
                    <td class="flex gap-2">
                        <button class="btn btn-secondary btn-sm" onclick="setTimeout(function(){editUser('${u.id}')},0)">편집</button>
                        ${u.id !== currentUser.id ? `<button class="btn btn-danger btn-sm" onclick="setTimeout(function(){deleteUser('${u.id}')},0)">삭제</button>` : ''}
                    </td>
                </tr>
            `).join('');
        }

        function getRoleName(role) { return { admin: '관리자', user: '사용자', guest: '게스트' }[role] || role; }

        async function loadUserStats() {
             try {
                 const res = await authFetch('/api/admin/users/stats');
                 const stats = await res.json();
                 const payload = stats.data || stats;
                 document.getElementById('statTotalUsers').textContent = payload.total_users || 0;
                 document.getElementById('statActiveUsers').textContent = payload.active_users || 0;
                 document.getElementById('statAdmins').textContent = payload.admins || 0;
             } catch (e) { }
             try {
                 const res = await authFetch('/api/admin/stats');
                 if (res.ok) { const data = await res.json(); const payload2 = data.data || data; document.getElementById('statTodayQueries').textContent = payload2.today_queries || 0; }
             } catch (e) { }
         }

        function showAddUserModal() {
            document.getElementById('editModalTitle').textContent = '새 사용자 추가';
            document.getElementById('editUserId').value = '';
            document.getElementById('editEmail').value = '';
            document.getElementById('editPassword').value = '';
            document.getElementById('editRole').value = 'user';
            document.getElementById('editActive').value = '1';
            document.getElementById('editUserModal').classList.add('active');
        }

         async function editUser(id) {
             try {
                 const res = await authFetch(`/api/admin/users?search=`);
                 const data = await res.json();
                 const payload = data.data || data;
                 const user = (payload.users || []).find(u => u.id === id);
                 if (!user) { showToast('사용자를 찾을 수 없습니다', 'error'); return; }
                document.getElementById('editModalTitle').textContent = '사용자 편집';
                document.getElementById('editUserId').value = user.id;
                document.getElementById('editEmail').value = user.email;
                document.getElementById('editPassword').value = '';
                document.getElementById('editRole').value = user.role;
                document.getElementById('editActive').value = user.is_active ? '1' : '0';
                document.getElementById('editUserModal').classList.add('active');
            } catch (e) { showToast('사용자 정보 로드 실패', 'error'); }
        }

        async function saveUser() {
            const id = document.getElementById('editUserId').value;
            const email = document.getElementById('editEmail').value;
            const password = document.getElementById('editPassword').value;
            const role = document.getElementById('editRole').value;
            const is_active = document.getElementById('editActive').value === '1';
            if (!email) { showToast('이메일을 입력하세요', 'error'); return; }
            try {
                if (id) {
                    await authFetch(`/api/admin/users/${id}`, { method: 'PUT', body: JSON.stringify({ email, role, is_active }) });
                    showToast('사용자 정보가 수정되었습니다', 'success');
                } else {
                    if (!password || password.length < 6) { showToast('비밀번호는 6자 이상이어야 합니다', 'error'); return; }
                    await authFetch('/api/auth/register', { method: 'POST', body: JSON.stringify({ email, password }) });
                    showToast('사용자가 추가되었습니다', 'success');
                }
                closeModal(); loadUsers(); loadUserStats();
            } catch (e) { showToast('저장 실패: ' + e.message, 'error'); }
        }

         async function deleteUser(id) {
             if (!confirm('정말 이 사용자를 삭제하시겠습니까?')) return;
             try {
                 const res = await authFetch(`/api/admin/users/${id}`, { method: 'DELETE' });
                 const data = await res.json();
                 if (res.ok) { showToast('사용자가 삭제되었습니다', 'success'); loadUsers(); loadUserStats(); }
                 else { 
                     const errorMsg = (data.error && typeof data.error === 'object') ? data.error.message : data.error;
                     showToast(errorMsg || '삭제 실패', 'error');
                 }
             } catch (e) { showToast('삭제 실패', 'error'); }
         }

        function closeModal() { document.getElementById('editUserModal').classList.remove('active'); }

        function debounceSearch() { clearTimeout(searchTimeout); searchTimeout = setTimeout(() => { usersPage = 1; loadUsers(); }, 300); }

         async function loadConversations() {
             const date = document.getElementById('filterDate').value;
             const role = document.getElementById('filterConvRole').value;
             const search = document.getElementById('filterConvSearch').value;
             try {
                 const params = new URLSearchParams({ page: convPage, limit: pageSize, ...(date && { date }), ...(role && { role }), ...(search && { search }) });
                 const res = await authFetch(`/api/admin/conversations?${params}`);
                 const data = await res.json();
                 const payload = data.data || data;
                 renderConversations(payload.conversations || []);
                 renderPagination('convPagination', payload.total || 0, convPage, (p) => { convPage = p; loadConversations(); });
             } catch (e) { showToast('대화 기록 로드 실패', 'error'); }
         }

        function renderConversations(conversations) {
            const tbody = document.getElementById('conversationsList');
            if (conversations.length === 0) { tbody.innerHTML = '<tr><td colspan="4" class="text-center text-muted p-4">대화 기록이 없습니다</td></tr>'; return; }
            tbody.innerHTML = conversations.map(c => `
                <tr>
                    <td>${formatDateTime(c.created_at)}</td>
                    <td><span class="badge ${c.role === 'user' ? 'badge-user' : 'badge-info'}">${c.role}</span></td>
                    <td class="conv-content-cell">${escapeHtml(c.content?.substring(0, 100) || '')}</td>
                    <td class="text-muted text-sm">${c.model || '-'}</td>
                </tr>
            `).join('');
        }

        function debounceConvSearch() { clearTimeout(searchTimeout); searchTimeout = setTimeout(() => { convPage = 1; loadConversations(); }, 300); }
        function exportCSV() { window.open('/api/admin/conversations/export?format=csv', '_blank'); }

        // --- pagination callback registry (avoids function.toString() hack) ---
        const _pgCb = {};

        function renderPagination(containerId, total, currentPage, onPageChange) {
            const totalPages = Math.ceil(total / pageSize);
            const container = document.getElementById(containerId);
            if (!container) return;
            if (totalPages <= 1) { container.innerHTML = ''; return; }
            _pgCb[containerId] = onPageChange;

            const delta = 2;
            const start = Math.max(1, currentPage - delta);
            const end   = Math.min(totalPages, currentPage + delta);
            let html = '';

            // 이전
            html += '<button class="btn btn-secondary btn-sm"' +
                (currentPage === 1 ? ' disabled' : '') +
                ' onclick="_pg(' + JSON.stringify(containerId) + ',' + (currentPage - 1) + ')">‹</button>';

            // 첫 페이지 + 앞 줄임표
            if (start > 1) {
                html += '<button class="btn btn-secondary btn-sm" onclick="_pg(' + JSON.stringify(containerId) + ',1)">1</button>';
                if (start > 2) html += '<span class="admin-pg-ellipsis">…</span>';
            }

            // 윈도우 페이지 번호
            for (let i = start; i <= end; i++) {
                html += '<button class="btn ' + (i === currentPage ? 'btn-primary' : 'btn-secondary') +
                    ' btn-sm" onclick="_pg(' + JSON.stringify(containerId) + ',' + i + ')">' + i + '</button>';
            }

            // 끝 페이지 + 뒤 줄임표
            if (end < totalPages) {
                if (end < totalPages - 1) html += '<span class="admin-pg-ellipsis">…</span>';
                html += '<button class="btn btn-secondary btn-sm" onclick="_pg(' + JSON.stringify(containerId) + ',' + totalPages + ')">' + totalPages + '</button>';
            }

            // 다음
            html += '<button class="btn btn-secondary btn-sm"' +
                (currentPage === totalPages ? ' disabled' : '') +
                ' onclick="_pg(' + JSON.stringify(containerId) + ',' + (currentPage + 1) + ')">›</button>';

            // 페이지 정보
            html += '<span class="admin-pg-info">' + currentPage + ' / ' + totalPages + '</span>';

            container.innerHTML = html;
        }

        function _pg(containerId, page) {
            if (_pgCb[containerId]) _pgCb[containerId](page);
        }

        function formatDate(dateStr) {
            if (!dateStr) return '-';
            const d = new Date(dateStr);
            return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
        }

        function formatDateTime(dateStr) {
            if (!dateStr) return '-';
            const d = new Date(dateStr);
            return `${formatDate(dateStr)} ${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // Init
        (async () => {
            if (await checkAuth()) { loadUsers(); loadUserStats(); loadConversations(); }
        })();
    </script>
</body>

</html>
