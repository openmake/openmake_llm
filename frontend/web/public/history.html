<!DOCTYPE html>
<html lang="ko" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
    <title>대화 히스토리 - OpenMake.Ai</title>
    <link rel="icon" type="image/png" href="/logo.png">

    <!-- 통합 디자인 시스템 -->
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"
        rel="stylesheet">
    <link rel="stylesheet" href="/css/design-tokens.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/layout.css">

    <style>
        .session-card {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            padding: var(--space-5);
            border: 1px solid var(--border-light);
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: var(--space-3);
        }

        .session-card:hover {
            border-color: var(--accent-primary);
        }

        .session-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .session-title {
            font-weight: var(--font-weight-semibold);
        }

        .session-meta {
            display: flex;
            gap: var(--space-4);
            font-size: var(--font-size-sm);
            color: var(--text-muted);
            margin-top: var(--space-2);
        }

        .session-preview {
            margin-top: var(--space-3);
            padding-top: var(--space-3);
            border-top: 1px solid var(--border-light);
            color: var(--text-muted);
            font-size: var(--font-size-sm);
            line-height: 1.5;
        }

        .messages-panel {
            display: none;
            margin-top: var(--space-4);
            padding: var(--space-4);
            background: var(--bg-secondary);
            border-radius: var(--radius-md);
        }

        .messages-panel.show {
            display: block;
        }

        .message {
            padding: var(--space-3);
            margin-bottom: var(--space-2);
            border-radius: var(--radius-md);
        }

        .message.user {
            background: var(--accent-primary-light);
        }

        .message.assistant {
            background: var(--bg-tertiary);
        }

        .message-role {
            font-size: var(--font-size-xs);
            color: var(--text-muted);
            margin-bottom: var(--space-1);
            text-transform: uppercase;
        }
    </style>
</head>

<body>
    <div class="app-layout">
        <button class="mobile-menu-btn" onclick="toggleMobileSidebar()"><span></span><span></span><span></span></button>
        <div class="sidebar-overlay" onclick="toggleMobileSidebar()"></div>
        <nav class="sidebar" id="sidebar"></nav>

        <div class="main-content">
            <div class="page-content">
                <div class="container container-xl">
                    <header class="page-header">
                        <div>
                            <h1 class="page-title page-title-gradient">📜 대화 히스토리</h1>
                            <p class="page-subtitle">이전 대화 기록 조회</p>
                        </div>
                        <div class="page-actions">
                            <button class="btn btn-secondary" onclick="exportHistory()">📥 내보내기</button>
                            <button class="btn btn-primary" onclick="loadSessions()">🔄 새로고침</button>
                        </div>
                    </header>

                    <div class="search-bar" style="margin-bottom: var(--space-6);">
                        <input type="date" id="filterDate" class="form-input" style="width: auto;" aria-label="날짜 필터"
                            onchange="loadSessions()">
                        <input type="text" id="searchQuery" class="form-input" style="max-width: 300px;" aria-label="검색어 입력"
                            placeholder="검색어 입력..." onkeyup="debounceSearch()">
                        <select id="sortOrder" class="form-select" style="width: auto;" aria-label="정렬 순서" onchange="loadSessions()">
                            <option value="desc">최신순</option>
                            <option value="asc">오래된순</option>
                        </select>
                    </div>

                    <div id="sessionsList">
                        <div class="empty-state">
                            <div class="empty-state-icon">🔄</div>
                            <div class="empty-state-title">대화 기록을 불러오는 중...</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="/js/components/sidebar.js"></script>
    <script type="module">
        const API_BASE = window.location.origin;
        let allSessions = [];
        let searchTimeout;

        // 인증 체크
        (function checkAuthAccess() {
            const user = localStorage.getItem('user');
            const isGuest = localStorage.getItem('isGuest') === 'true';
            if (!user || isGuest) {
                alert('이 페이지는 로그인이 필요합니다.');
                window.location.href = '/login.html';
            }
        })();

        async function loadSessions() {
            const list = document.getElementById('sessionsList');
            // 로딩 표시가 없으면 추가
            if (!allSessions.length) {
                list.innerHTML = '<div class="empty-state"><div class="empty-state-icon">🔄</div><div class="empty-state-title">대화 기록을 불러오는 중...</div></div>';
            }

            try {
                const res = await fetch('/api/chat/sessions?limit=100', { credentials: 'include' });
                const data = await res.json();
                const payload = data.data || data;

                if (data.success) {
                    allSessions = payload.sessions;
                    renderSessions();
                } else {
                    list.innerHTML = '<div class="empty-state"><div class="empty-state-icon">❌</div><div class="empty-state-title">데이터를 불러올 수 없습니다</div></div>';
                }
            } catch (e) {
                console.error('세션 로드 실패:', e);
                list.innerHTML = '<div class="empty-state"><div class="empty-state-title">서버 연결 오류</div></div>';
            }
        }

        function renderSessions() {
            const list = document.getElementById('sessionsList');
            const query = document.getElementById('searchQuery').value.toLowerCase();
            const dateFilter = document.getElementById('filterDate').value;
            const sortOrder = document.getElementById('sortOrder').value; // 'desc' or 'asc'

            let filtered = allSessions.filter(s => {
                // 검색 필터 (제목)
                if (query && !s.title.toLowerCase().includes(query)) return false;
                // 날짜 필터
                if (dateFilter) {
                    const sDate = new Date(s.createdAt).toISOString().split('T')[0];
                    if (sDate !== dateFilter) return false;
                }
                return true;
            });

            // 정렬
            filtered.sort((a, b) => {
                const timeA = new Date(a.updatedAt || a.createdAt).getTime();
                const timeB = new Date(b.updatedAt || b.createdAt).getTime();
                return sortOrder === 'desc' ? timeB - timeA : timeA - timeB;
            });

            if (filtered.length === 0) {
                list.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📭</div><div class="empty-state-title">대화 기록이 없습니다</div></div>';
                return;
            }

            list.innerHTML = filtered.map(s => `
                <div class="session-card" onclick="goToSession('${s.id}')">
                    <div class="session-header">
                        <span class="session-title">${escapeHtml(s.title || '새 대화')}</span>
                        <span class="session-meta">${formatDate(s.updatedAt || s.createdAt)}</span>
                    </div>
                    <div class="session-meta">
                        <span>💬 ${s.model || 'Unknown Model'}</span>
                    </div>
                    ${s.preview ? `<div class="session-preview">${escapeHtml(s.preview)}</div>` : ''}
                </div>
            `).join('');
        }

        function goToSession(id) {
            // 메인 채팅 화면으로 이동하며 세션 ID 전달
            window.location.href = `/?sessionId=${id}`;
        }

        function formatDate(dateStr) {
            const date = new Date(dateStr);
            return date.toLocaleDateString('ko-KR', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
        }

        function escapeHtml(text) {
            if (!text) return '';
            return text
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        function debounceSearch() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(renderSessions, 300); // API 재호출 대신 렌더링만 갱신
        }

        function exportHistory() {
            if (allSessions.length === 0) {
                alert('내보낼 데이터가 없습니다.');
                return;
            }
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(allSessions, null, 2));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            downloadAnchorNode.setAttribute("download", "chat_history.json");
            document.body.appendChild(downloadAnchorNode);
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
        }

        loadSessions();

        window.exportHistory = exportHistory;
        window.loadSessions = loadSessions;
        window.debounceSearch = debounceSearch;
        window.goToSession = goToSession;
    </script>
</body>

</html>
