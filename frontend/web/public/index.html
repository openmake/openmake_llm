<!DOCTYPE html>
<html lang="ko" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover, interactive-widget=resizes-content">
    <title>OpenMake.Ai</title>

    <meta name="theme-color" content="#131210">
    <meta name="description" content="AI 기반 지능형 채팅 어시스턴트">
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon.png">

    <!-- 한글 최적화 웹폰트 (self-hosted) -->
    <!-- vendor·CSS 는 절대경로(/...)로 참조 → Vite 가 hash 변환하지 않고 그대로 둠(파일명 유지).
         JS(<script type=module>)만 Vite content-hash 번들 대상. CSS 는 link 유지 + publicDir 복사. -->
    <link href="/vendor/pretendard/pretendard.css" rel="stylesheet">
    <!-- Performance: Preload hints -->
    <link rel="preload" href="/css/design-tokens.css" as="style">
    <!-- 디자인 시스템 CSS (순서 중요!) -->
    <link rel="stylesheet" href="/css/design-tokens.css">
    <link rel="stylesheet" href="/css/icons.css">

    <link rel="stylesheet" href="/css/animations.css">
    <link rel="stylesheet" href="/css/feature-cards.css">
    <link rel="stylesheet" href="/css/layout.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/model-selector.css">
    <link rel="stylesheet" href="/css/unified-sidebar.css">
    <link rel="stylesheet" href="/css/light-theme.css">
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/css/chat-status-toast.css">
    <link rel="stylesheet" href="/css/system-toast.css">
    <link rel="stylesheet" href="/css/mobile-fab.css">
    <link rel="stylesheet" href="/css/mobile-composer.css">
    <link rel="stylesheet" href="/css/command-palette.css">
    <!-- Iconify Icon Web Component (self-hosted, defer) -->
    <script src="/vendor/iconify-icon.min.js" defer></script>
    <!-- Markdown Parser (self-hosted, defer) -->
    <script src="/vendor/marked.min.js" defer></script>
    <!-- Code Highlighting (self-hosted, defer) -->
    <link rel="stylesheet" href="/vendor/hljs/github-dark.min.css"
        media="print" onload="this.media='all'">
    <script src="/vendor/hljs/highlight.min.js" defer></script>
    <!-- XSS Defense: DOMPurify (self-hosted, defer) -->
    <script src="/vendor/purify.min.js" defer></script>
    <!-- Math Rendering: KaTeX (self-hosted, defer) -->
    <link rel="stylesheet" href="/vendor/katex.min.css">
    <script src="/vendor/katex.min.js" defer></script>
    <!-- Diagram Rendering: Mermaid (self-hosted, defer) -->
    <script src="/vendor/mermaid.min.js" defer></script>
    <!-- guide_content.js: 2026-05-21 제거 — 사용 가이드 시스템 폐기 -->


    <style>
        .skip-link:focus {
            top: 0
        }
    </style>
</head>

<body>
    <a href="#mainContent" class="skip-link"
        style="position:absolute;top:-40px;left:0;background:var(--accent-primary);color:var(--text-inverse);padding:8px 16px;z-index:10000;transition:top 0.3s;text-decoration:none;font-family:Pretendard,sans-serif;font-weight:700;border-radius:var(--radius-sm)">Skip
        to main content</a>
    <div class="app">
        <!-- Mobile Menu Button -->
        <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="Toggle menu">
            <span></span>
            <span></span>
            <span></span>
        </button>

        <!-- Unified Sidebar (T4: 3-state Gemini-style) -->
        <aside id="sidebar" role="complementary" aria-label="Sidebar"></aside>

        <!-- 메인 콘텐츠 영역 -->
        <main class="main-content" id="mainContent" role="main">

            <!-- 채팅 영역 (기본 뷰 — SPA 라우터가 / 일 때 표시) -->
            <div id="chat-area">
                <div class="chat-area" id="chatArea" role="log" aria-label="Chat messages" aria-live="polite">
                    <div class="welcome-screen animate-fadeInUp" id="welcomeScreen">
                        <div class="welcome-avatar animate-popIn">
                            <img src="/images/avatar/character-avatar.png" alt="OpenMake AI" class="avatar-img">
                        </div>
                        <h1 class="welcome-title animate-fadeInUp" style="animation-delay: 0.1s;">오늘도 화이팅!<br>무엇을
                            <span class="accent">도와드릴까요?</span> 😊
                        </h1>
                        <p class="welcome-subtitle animate-fadeInUp" style="animation-delay: 0.2s;">AI 어시스턴트가 질문에
                            답변하고,<br>문서를 분석하고, 코드를 작성합니다.</p>

                        <!-- 기능 카드 그리드 -->
                        <div class="feature-cards animate-fadeInUp" style="animation-delay: 0.3s;">
                            <div class="feature-card" onclick="startFeatureChat('coding')">
                                <div class="feature-icon">
                                    <img src="/images/icons/coding-agent.png" alt="코딩">
                                </div>
                                <div class="feature-title">코딩 에이전트</div>
                                <div class="feature-desc">코드 작성 및 디버깅</div>
                                <button class="feature-btn">시작하기</button>
                            </div>
                            <div class="feature-card" onclick="startFeatureChat('document')">
                                <div class="feature-icon">
                                    <img src="/images/icons/document-agent.png" alt="문서">
                                </div>
                                <div class="feature-title">문서 작성 도우미</div>
                                <div class="feature-desc">블로그, 보고서 초안 작성</div>
                                <button class="feature-btn">시작하기</button>
                            </div>
                            <div class="feature-card" onclick="startFeatureChat('data')">
                                <div class="feature-icon">
                                    <img src="/images/icons/data-analysis.png" alt="데이터">
                                </div>
                                <div class="feature-title">데이터 분석</div>
                                <div class="feature-desc">데이터 시각화 및 인사이트 도출</div>
                                <button class="feature-btn">시작하기</button>
                            </div>
                            <div class="feature-card" onclick="startFeatureChat('chat')">
                                <div class="feature-icon">
                                    <img src="/images/icons/chat-agent.png" alt="대화">
                                </div>
                                <div class="feature-title">자유 대화</div>
                                <div class="feature-desc">무엇이든 물어보세요</div>
                                <button class="feature-btn">시작하기</button>
                            </div>
                        </div>
                    </div>
                    <div class="chat-messages" id="chatMessages"></div>
                </div>

                <div class="input-container">
                    <div id="agentBadge" style="display: none;"></div>
                    <div class="chat-input-container">
                        <div class="attachments" id="attachments" style="display: none;"></div>
                        <div class="input-wrapper">
                            <textarea id="chatInput" name="chatInput" placeholder="메시지를 입력하세요..." rows="1"
                                aria-label="메시지 입력" onkeydown="handleKeyDown(event)"></textarea>
                            <div class="input-actions">
                                <div class="left-actions">
                                    <button class="action-btn" onclick="newChat()" title="새 대화 (+)">
                                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
                                            stroke="currentColor" stroke-width="2">
                                            <path d="M12 5v14M5 12h14" />
                                        </svg>
                                    </button>
                                    <button class="action-btn" onclick="showFileUpload()" title="파일 첨부">
                                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
                                            stroke="currentColor" stroke-width="2">
                                            <path
                                                d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48" />
                                        </svg>
                                    </button>
                                    <button class="action-btn" id="webSearchBtn" onclick="toggleWebSearch()"
                                        title="웹 검색">
                                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
                                            stroke="currentColor" stroke-width="2">
                                            <circle cx="12" cy="12" r="10" />
                                            <line x1="2" y1="12" x2="22" y2="12" />
                                            <path
                                                d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z" />
                                        </svg>
                                    </button>
                                    <button class="action-btn composer-more" id="composerMoreBtn" type="button"
                                        title="더보기" aria-label="더 많은 도구" aria-expanded="false">
                                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
                                            stroke="currentColor" stroke-width="2">
                                            <circle cx="5" cy="12" r="1.6" />
                                            <circle cx="12" cy="12" r="1.6" />
                                            <circle cx="19" cy="12" r="1.6" />
                                        </svg>
                                    </button>
                                    <div class="composer-overflow" id="composerSheet" role="group" aria-label="추가 도구">
                                    <button class="action-btn composer-secondary" id="discussionModeBtn" onclick="toggleDiscussionMode()"
                                        title="멀티 에이전트 토론" data-label="토론">
                                        <iconify-icon icon="lucide:target"></iconify-icon>
                                    </button>
                                    <button class="action-btn composer-secondary" id="thinkingModeBtn" onclick="toggleThinkingMode()"
                                        title="Thinking 모드 (심층 추론)" data-label="Thinking">
                                        <iconify-icon icon="lucide:brain"></iconify-icon>
                                    </button>
                                    <button class="action-btn composer-secondary" id="deepResearchBtn" onclick="toggleDeepResearch()"
                                        title="Deep Research (심층 연구)" data-label="딥 리서치">
                                        <iconify-icon icon="lucide:flask-conical"></iconify-icon>
                                    </button>
                                    <button class="action-btn composer-secondary" id="agentTaskBtn" onclick="toggleAgentTask()"
                                        title="에이전트 작업 (백그라운드 자율 수행)" data-label="에이전트 작업">
                                        <iconify-icon icon="lucide:bot"></iconify-icon>
                                    </button>
                                    <button class="action-btn composer-secondary" id="responseStyleBtn" onclick="cycleResponseStyle()"
                                        title="응답 스타일: 기본 (균형)" data-style="default" data-label="응답 스타일">📝</button>
                                    <select class="action-btn composer-secondary" id="userAgentSelect" onchange="setUserAgent(this.value)"
                                        title="페르소나 — 내가 만든 Agent를 이 대화에 적용" style="padding:4px 8px;background:var(--bg-tertiary);color:var(--text-primary);border:1px solid var(--border-light);border-radius:var(--radius-md);font-size:var(--font-size-sm);max-width:160px;">
                                        <option value="">🎭 페르소나 자동</option>
                                    </select>
                                    </div>
                                </div>
                                <div class="right-actions">
                                    <div id="connectionStatus" class="connection-status">
                                        <span class="status-dot"></span>
                                        <span class="status-text">연결됨</span>
                                    </div>
                                    <button class="send-btn" id="sendBtn" title="전송 (Enter)">
                                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
                                            stroke="currentColor" stroke-width="2">
                                            <path d="M22 2L11 13M22 2L15 22L11 13L2 9L22 2Z" />
                                        </svg>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>


            </div>

            <!-- SPA 페이지 콘텐츠 (라우터가 모듈을 주입하는 영역) -->
            <div id="page-content" style="display: none;"></div>

        </main>

        <!-- 스크린 리더용 라이브 알림 영역 (P1-14 접근성 개선) -->
        <!-- aria-live="polite" — AI 응답 상태를 스크린 리더에 전달 (현재 포커스 방해 없이) -->
        <div id="a11y-announcer"
             aria-live="polite"
             aria-atomic="true"
             role="status"
             style="position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;">
        </div>

        <!-- 모달 레이어 -->

        <!-- 파일 업로드 모달 -->
        <div class="modal" id="fileModal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3 class="modal-title">📎 파일 첨부</h3>
                    <button class="modal-close" onclick="closeFileModal()">&times;</button>
                </div>
                <div class="modal-body">
                    <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
                        <div class="upload-content">
                            <span class="upload-icon">📁</span>
                            <p>파일을 드래그하거나 클릭하여 선택</p>
                            <input type="file" id="fileInput" name="fileInput" aria-label="파일 선택" multiple hidden>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div> <!-- app 끝 -->

    <!-- 앱 엔트리 포인트 (ES Module — Vite content-hash 번들 대상. 캐시버스터는 content-hash 가 대체) -->
    <!-- API 중앙 관리 (ES Module — window.API_ENDPOINTS / window.ApiClient 전역 노출) -->
    <script type="module" src="/js/modules/api-endpoints.js"></script>
    <script type="module" src="/js/modules/api-client.js"></script>

    <script type="module" src="/js/main.js"></script>
    <!-- 채팅 이미지 첨부 (fileInput → base64 → attachedFiles → 미리보기). self-init -->
    <script type="module" src="/js/modules/file-attach.js"></script>
    <!-- ⌘K 커맨드 팔레트 (Chat-first 구조 — 이동/액션 단일 진입점). self-init -->
    <script type="module" src="/js/modules/command-palette.js"></script>
</body>

</html>
