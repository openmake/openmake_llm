# Artifact Viewer - separate-origin strict CSP static viewer (Plan C)
#
# - Per-page script-src (hash / 'self' / react 'unsafe-eval') is in each index.html <meta> CSP.
# - nginx only adds header-only directives (frame-ancestors) + hardening headers.
# - Access control: /a/<pubId>/ uses auth_request -> backend /api/viewer-authz token check.
# - /vendor/ is public (libraries + bootstrap), cached.
#
# NOTE: nginx does NOT inherit server-level add_header into a location that has its own
# add_header. So locations needing headers repeat the full set (/a). /vendor uses only
# `expires` (no add_header) to keep inheritance.

server {
    listen 80;
    server_name _;
    root /srv;
    index index.html;

    add_header Content-Security-Policy "frame-ancestors 'none'" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Libraries + bootstrap (public). No add_header -> inherits server headers.
    location /vendor/ {
        expires 7d;
        try_files $uri =404;
    }

    # Internal auth subrequest. pub parsed from X-Original-URI, k forwarded via args.
    location = /_authz {
        internal;
        # 정적 proxy_pass(변수 없음) → 시작 시 /etc/hosts 로 host.docker.internal 해석(resolver 불필요).
        # pub/k 는 X-Original-URI 헤더로 전달(쿼리는 정적 proxy_pass 라 미전달).
        proxy_pass http://host.docker.internal:52416/api/viewer-authz;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Original-URI $request_uri;
    }

    # Published artifact viewer - /a/<pubId>/ . Access token (?k=) required.
    location ~ ^/a/[A-Za-z0-9-]+/ {
        auth_request /_authz;
        add_header Cache-Control "no-store" always;
        add_header Content-Security-Policy "frame-ancestors 'none'" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        try_files $uri $uri/index.html =404;
    }

    location = / { return 404; }
}
