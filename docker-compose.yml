services:
  app:
    build: .
    ports:
      - "52417:52416"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://openmake:openmake@postgres:5432/openmake_llm
      OLLAMA_BASE_URL: http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: openmake
      POSTGRES_PASSWORD: openmake
      POSTGRES_DB: openmake_llm
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openmake -d openmake_llm"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
