# OpenMake LLM — Nginx 리버스 프록시 (Lumen Next.js + Express 백엔드)
#
# 토폴로지 (same-origin): 브라우저는 단일 오리진만 보므로 쿠키(SameSite=Lax)·CSRF·WS 가
#   백엔드 변경 없이 그대로 동작한다.
#     /            → Next.js (openmake-next, :3000)
#     /api/*       → Express (openmake-llm, :52416)
#     /ws          → Express WebSocket (채팅 스트리밍)
#
# 적용:
#   1) npm run build:frontend-next   (apps/web/.next 생성)
#   2) pm2 start ecosystem.config.js (openmake-llm + openmake-next 기동)
#   3) 이 파일을 /etc/nginx/sites-available/openmake.conf 로 복사 → sites-enabled 심링크
#   4) sudo nginx -t && sudo systemctl reload nginx
#
# ⚠️ 운영 반영(pm2/nginx 명령)은 직접 실행하십시오.

upstream openmake_api  { server 127.0.0.1:52416; }
upstream openmake_next { server 127.0.0.1:3000; }

server {
    listen 80;
    server_name _;                       # 실제 도메인으로 교체 (예: openmake.example.com)

    client_max_body_size 50m;            # 백엔드 JSON/업로드 한도와 정합

    # ── REST API → Express ───────────────────────────────
    location /api/ {
        proxy_pass http://openmake_api;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;          # LLM 스트리밍/장시간 요청
    }

    # ── WebSocket (채팅 스트리밍) → Express ───────────────
    location /ws {
        proxy_pass http://openmake_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;         # 장시간 유지되는 소켓
    }

    # ── 나머지 → Next.js (정적/SSR/페이지) ─────────────────
    location / {
        proxy_pass http://openmake_next;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;   # Next 자체 업그레이드 대비
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host       $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# http 블록에 아래 map 이 없다면 추가 (Connection 헤더 조건부 처리):
# map $http_upgrade $connection_upgrade { default upgrade; '' close; }
