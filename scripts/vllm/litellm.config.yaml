model_list:
  - model_name: qwen2.5-7b
    litellm_params:
      model: openai/Qwen/Qwen2.5-7B-Instruct
      api_base: http://localhost:8001/v1
      api_key: os.environ/VLLM_API_KEY

  - model_name: exaone4.5-33b-awq
